name: bot

on:
  schedule:
    - cron: "0 7,19 * * *"   # twice a day (07:00 & 19:00 UTC)
  workflow_dispatch: {}       # manual trigger for on-demand command processing

permissions:
  contents: read              # state lives in a private gist, not the repo

concurrency:
  group: bot                  # never let two runs race on the shared state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache SPECTER model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-specter-allenai-v1

      - name: Install dependencies
        run: |
          python -m pip install -q torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -q -r requirements.txt

      - name: Restore state (gist -> data/)
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python tools/state_store.py pull

      - name: Register command menu
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python main.py --register-menu

      - name: Process incoming commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --poll-commands -v

      - name: Fetch papers and send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --notifier telegram -v

      - name: Save state (data/ -> gist)
        if: always()            # persist even if an earlier step failed
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python tools/state_store.py push
