# Paper letti NON su arXiv: testo "titolo\n\nabstract" embeddato direttamente.
seed_texts:
  - |
    A Mathematical Framework for Transformer Circuits

    A mathematical framework for reverse-engineering transformer internals.
    Attention heads are independent, additive operations that read from and
    write to a residual stream as a communication channel; the framework
    analyzes query-key and output-value circuits, identifies induction heads
    as a mechanism for in-context learning, and shows how attention heads
    compose across layers to implement more sophisticated algorithms.

# Contributo assoluto di ogni segnale:  total = min(1, Σ wᵢ·sᵢ)
weights:
  keyword: 0.6      # 1 keyword nel titolo (~0.63) -> ~0.38 -> supera il digest
  author: 1.0       # un autore seguito da solo basta per l'alert
  embedding: 0.6    # attivo da Phase 2

# Soglie di routing
thresholds:
  digest: 0.30      # ~2 keyword nel titolo
  alert: 0.60       # match forte (keyword+embedding) o autore seguito

# ─────────────────────────────────────────────────────────────────────────────
# Feedback loop 👍/👎 (inline button sotto ogni paper). I voti diventano seed
# DINAMICI nel solo canale embedding: 👍 = nuovo centro d'interesse, 👎 = penalità
# soft con margine. Confinato all'embedding (keyword/autori dichiarati restano
# intatti), ancorato sotto i seed di onboarding e robusto a pochi voti (cold-start).
# Senza voti, lo scoring è identico a Phase 2.
# ─────────────────────────────────────────────────────────────────────────────
feedback:
  w_pos_max: 0.6       # peso max di un 👍 (< 1.0 dei seed di onboarding: ancoraggio)
  neg_lambda: 0.5      # peso del termine negativo (< 1: il 👎 è più conservativo)
  baseline_neg: 0.80   # margine: il 👎 colpisce solo paper molto simili (b_neg > b=0.75)
  tau_days: 120        # decadimento temporale dei voti: exp(-Δt/τ)
  coldstart_k: 5       # il loop pesa 0→pieno nei primi K voti totali
  cap_m: 50            # max voti per classe (ring-buffer): niente drift, gist contenuto

sources:
  arxiv:
    categories: [cs.LG, cs.CL, cs.CV, cs.AI, stat.ML]
    max_results: 150
    lookback_days: 2
